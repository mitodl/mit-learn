include:
  - docker-compose.services.yml

services:
  ai:
    extends:
      file: docker-compose.apps.yml
      service: ai
    env_file: env/codespaces.env
    depends_on:
      - opensearch-node-mitopen-1

  web:
    extends:
      file: docker-compose.apps.yml
      service: web
    env_file: env/codespaces.env
    depends_on:
      - opensearch-node-mitopen-1

  watch:
    extends:
      file: docker-compose.apps.yml
      service: watch
    env_file: env/codespaces.env

  celery:
    extends:
      file: docker-compose.apps.yml
      service: celery
    env_file: env/codespaces.env
