version: "3.9"

services:
  keycloak:
    image: quay.io/keycloak/keycloak:latest
    container_name: keycloak
    restart: unless-stopped

    environment:
      KEYCLOAK_ADMIN: ${KEYCLOAK_ADMIN:-admin}
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}

    command: >
      start --verbose --features scripts --import-realm
      --hostname=${KEYCLOAK_BASE_URL:-kc.ol.local}
      --hostname-strict=false
      --hostname-debug=true
      --https-port=${KEYCLOAK_SSL_PORT:-8067}
      --https-certificate-file=/etc/x509/https/tls.crt
      --https-certificate-key-file=/etc/x509/https/tls.key
      --http-enabled=true
      --http-port=${KEYCLOAK_PORT:-8066}
      --config-keystore=/etc/keycloak-store
      --config-keystore-password=${KEYCLOAK_SVC_KEYSTORE_PASSWORD:-changeit}

    ports:
      - "${KEYCLOAK_PORT:-8066}:${KEYCLOAK_PORT:-8066}"
      - "${KEYCLOAK_SSL_PORT:-8067}:${KEYCLOAK_SSL_PORT:-8067}"

    volumes:
      - keycloak_data:/opt/keycloak/data
      - ./certs:/etc/x509/https:ro

    networks:
      - ol-network

  apigateway:
    image: apache/apisix:latest
    container_name: apigateway
    restart: unless-stopped

    environment:
      APISIX_PORT: ${APISIX_PORT:-8065}
      KEYCLOAK_BASE_URL: ${KEYCLOAK_BASE_URL:-http://kc.ol.local:8066}
      KEYCLOAK_CLIENT_ID: ${KEYCLOAK_CLIENT_ID:-apisix}
      KEYCLOAK_CLIENT_SECRET: ${KEYCLOAK_CLIENT_SECRET:-HckCZXToXfaetbBx0Fo3xbjnC468oMi4}
      KEYCLOAK_REALM_NAME: ${KEYCLOAK_REALM_NAME:-ol-local}
      KEYCLOAK_DISCOVERY_URL: ${KEYCLOAK_DISCOVERY_URL:-http://kc.ol.local:8066/realms/ol-local/.well-known/openid-configuration}

    ports:
      - "${APISIX_PORT:-8065}:${APISIX_PORT:-8065}"

    depends_on:
      - keycloak

    networks:
      - ol-network

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped

    ports:
      - "${REDIS_PORT:-6379}:6379"

    volumes:
      - redis_data:/data

    networks:
      - ol-network

networks:
  ol-network:
    driver: bridge

volumes:
  keycloak_data:
  redis_data:
