  CODEOWNERS: |
    # This is a comment.
    # Each line is a file pattern followed by one or more owners.

    # These owners will be the default owners for everything in
    # the repo. Unless a later match takes precedence,
    # @global-owner1 and @global-owner2 will be requested for
    # review when someone opens a pull request.
    *       @mitodl/owners-mit-learn

    # Order is important; the last matching pattern takes the most
    # precedence. When someone opens a pull request that only
    # modifies JS files, only @js-owner and not the global
    # owner(s) will be requested for a review.
    # *.js    @js-owner #This is an inline comment.

    # You can also use email addresses if you prefer. They'll be
    # used to look up users just like we do for commit author
    # emails.
    # *.go docs@example.com

    # Teams can be specified as code owners as well. Teams should
    # be identified in the format @org/team-name. Teams must have
    # explicit write access to the repository. In this example,
    # the octocats team in the octo-org organization owns all .txt files.
    # *.txt @octo-org/octocats

    # In this example, @doctocat owns any files in the build/logs
    # directory at the root of the repository and any of its
    # subdirectories.
    # /build/logs/ @doctocat

    # The `docs/*` pattern will match files like
    # `docs/getting-started.md` but not further nested files like
    # `docs/build-app/troubleshooting.md`.
    # docs/*  docs@example.com

    # In this example, @octocat owns any file in an apps directory
    # anywhere in your repository.
    # apps/ @octocat

    # In this example, @doctocat owns any file in the `/docs`
    # directory in the root of your repository and any of its
    # subdirectories.
    # /docs/ @doctocat

    # In this example, any change inside the `/scripts` directory
    # will require approval from @doctocat or @octocat.
    # /scripts/ @doctocat @octocat

    # In this example, @octocat owns any file in a `/logs` directory such as
    # `/build/logs`, `/scripts/logs`, and `/deeply/nested/logs`. Any changes
    # in a `/logs` directory will require approval from @octocat.
    # **/logs @octocat

    # In this example, @octocat owns any file in the `/apps`
    # directory in the root of your repository except for the `/apps/github`
    # subdirectory, as its owners are left empty.
    # /apps/ @octocat
    # /apps/github
  Dockerfile: |
    FROM python:3.12.6
    LABEL maintainer "ODL DevOps <mitx-devops@mit.edu>"

    # Add package files, install updated node and pip
    WORKDIR /tmp

    # Install packages
    COPY apt.txt /tmp/apt.txt
    RUN apt-get update
    RUN apt-get install -y $(grep -vE "^\s*#" apt.txt  | tr "\n" " ")
    RUN apt-get update && apt-get install libpq-dev postgresql-client -y

    # pip
    RUN curl --silent --location https://bootstrap.pypa.io/get-pip.py | python3 -

    # Add, and run as, non-root user.
    RUN mkdir /src
    RUN adduser --disabled-password --gecos "" mitodl
    RUN mkdir /var/media && chown -R mitodl:mitodl /var/media

    ## Set some poetry config
    ENV  \
      POETRY_VERSION=1.7.1 \
      POETRY_VIRTUALENVS_CREATE=true \
      POETRY_CACHE_DIR='/tmp/cache/poetry' \
      POETRY_HOME='/home/mitodl/.local' \
      VIRTUAL_ENV="/opt/venv"
    ENV PATH="$VIRTUAL_ENV/bin:$POETRY_HOME/bin:$PATH"

    # Install poetry
    RUN pip install "poetry==$POETRY_VERSION"

    COPY pyproject.toml /src
    COPY poetry.lock /src
    RUN chown -R mitodl:mitodl /src
    RUN mkdir ${VIRTUAL_ENV} && chown -R mitodl:mitodl ${VIRTUAL_ENV}

    ## Install poetry itself, and pre-create a venv with predictable name
    USER mitodl
    RUN curl -sSL https://install.python-poetry.org \
      | \
      POETRY_VERSION=${POETRY_VERSION} \
      POETRY_HOME=${POETRY_HOME} \
      python3 -q
    WORKDIR /src
    RUN python3 -m venv $VIRTUAL_ENV
    RUN poetry install

    # Add project
    USER root
    COPY . /src
    WORKDIR /src
    RUN mkdir /src/staticfiles

    RUN apt-get clean && apt-get purge

    USER mitodl

    EXPOSE 8061
    ENV PORT 8061
    CMD uwsgi uwsgi.ini
