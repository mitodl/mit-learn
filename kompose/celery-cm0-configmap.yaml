apiVersion: v1
kind: ConfigMap
data:
  .coveragerc: |
    [run]
    branch = True
    source = .
    data_file=/tmp/coverage
    omit =
        main/wsgi.py
        manage.py
        ./.tox/*
        */migrations/*
        *_test.py
        *_tests.py

    [report]
    exclude_lines =
        pragma: no cover
    show_missing = True
    precision = 2

    [html]
    directory = htmlcov
  .dockerignore: |
    .tox
    .cache
    htmlcov
    .coverage
    node_modules
    staticfiles/
  .editorconfig: |
    root = true

    [*.py]
    indent_style = space
    indent_size = 4
    trim_trailing_whitespace = true
    insert_final_newline = true

    [*.js]
    indent_style = space
    indent_size = 2
    trim_trailing_whitespace = true
    insert_final_newline = true
