apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose -vv -f docker-compose.yml convert --controller deployment --pvc-request-size 2000Mi --out kompose/ --profile backend --profile frontend --namespace learn-ai
    kompose.version: 1.34.0 (HEAD)
  labels:
    io.kompose.service: opensearch-node-mitopen-1
  name: opensearch-node-mitopen-1
  namespace: learn-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: opensearch-node-mitopen-1
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose -vv -f docker-compose.yml convert --controller deployment --pvc-request-size 2000Mi --out kompose/ --profile backend --profile frontend --namespace learn-ai
        kompose.version: 1.34.0 (HEAD)
      labels:
        io.kompose.service: opensearch-node-mitopen-1
    spec:
      containers:
        - env:
            - name: DISABLE_INSTALL_DEMO_CONFIG
              value: "true"
            - name: DISABLE_SECURITY_PLUGIN
              value: "true"
            - name: OPENSEARCH_JAVA_OPTS
              value: -Xms1024m -Xmx1024m
            - name: bootstrap.memory_lock
              value: "true"
            - name: cluster.name
              value: opensearch-cluster
            - name: discovery.type
              value: single-node
            - name: node.name
              value: opensearch-node-mitopen-1
          image: opensearchproject/opensearch:2.18.0
          livenessProbe:
            exec:
              command:
                - curl http://localhost:9200/_cluster/health || exit 1
            failureThreshold: 20
            periodSeconds: 3
            timeoutSeconds: 3
          name: opensearch-node-mitopen-1
          ports:
            - containerPort: 9200
              protocol: TCP
            - containerPort: 9600
              protocol: TCP
          volumeMounts:
            - mountPath: /usr/share/opensearch/data
              name: opensearch-data1
      hostname: opensearch-node-mitopen-1
      restartPolicy: Always
      volumes:
        - name: opensearch-data1
          persistentVolumeClaim:
            claimName: opensearch-data1
