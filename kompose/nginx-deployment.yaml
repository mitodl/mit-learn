apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose -vv -f docker-compose.yml convert --controller deployment --pvc-request-size 2000Mi --out kompose/ --profile backend --profile frontend --namespace learn-ai
    kompose.version: 1.34.0 (HEAD)
  labels:
    io.kompose.service: nginx
  name: nginx
  namespace: learn-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: nginx
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose -vv -f docker-compose.yml convert --controller deployment --pvc-request-size 2000Mi --out kompose/ --profile backend --profile frontend --namespace learn-ai
        kompose.version: 1.34.0 (HEAD)
      labels:
        io.kompose.service: nginx
    spec:
      containers:
        - env:
            - name: NGINX_UWSGI_PASS
              value: web:8061
            - name: PORT
              value: "8063"
          image: mitodl/mitlearn-nginx:dev
          name: nginx
          ports:
            - containerPort: 8063
              protocol: TCP
          volumeMounts:
            - mountPath: /etc/nginx/templates
              name: nginx-cm0
      restartPolicy: Always
      volumes:
        - configMap:
            name: nginx-cm0
          name: nginx-cm0
