apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose -vv -f docker-compose.yml convert --controller deployment --pvc-request-size 2000Mi --out kompose/ --profile backend --profile frontend --namespace learn-ai
    kompose.version: 1.34.0 (HEAD)
  labels:
    io.kompose.service: litellm
  name: litellm
  namespace: learn-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: litellm
  strategy:
    type: Recreate
  template:
    metadata:
      annotations:
        kompose.cmd: kompose -vv -f docker-compose.yml convert --controller deployment --pvc-request-size 2000Mi --out kompose/ --profile backend --profile frontend --namespace learn-ai
        kompose.version: 1.34.0 (HEAD)
      labels:
        io.kompose.service: litellm
    spec:
      containers:
        - env:
            - name: DATABASE_URL
              value: postgres://postgres:postgres@db:5432/litellm
            - name: LITELLM_MASTER_KEY
            - name: LITELLM_SALT_KEY
            - name: OPENAI_API_KEY
          image: mitodl/mitlearn-litellm:dev
          name: litellm
          ports:
            - containerPort: 4000
              protocol: TCP
          volumeMounts:
            - mountPath: /app
              name: litellm-cm0
      restartPolicy: Always
      volumes:
        - configMap:
            name: litellm-cm0
          name: litellm-cm0
