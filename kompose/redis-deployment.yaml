apiVersion: apps/v1
kind: Deployment
metadata:
  annotations:
    kompose.cmd: kompose -vv -f docker-compose.yml convert --controller deployment --pvc-request-size 2000Mi --out kompose/ --profile backend --profile frontend --namespace learn-ai
    kompose.version: 1.34.0 (HEAD)
  labels:
    io.kompose.service: redis
  name: redis
  namespace: learn-ai
spec:
  replicas: 1
  selector:
    matchLabels:
      io.kompose.service: redis
  template:
    metadata:
      annotations:
        kompose.cmd: kompose -vv -f docker-compose.yml convert --controller deployment --pvc-request-size 2000Mi --out kompose/ --profile backend --profile frontend --namespace learn-ai
        kompose.version: 1.34.0 (HEAD)
      labels:
        io.kompose.service: redis
    spec:
      containers:
        - image: redis:7.4.1
          livenessProbe:
            exec:
              command:
                - redis-cli
                - ping
                - '|'
                - grep
                - PONG
            failureThreshold: 10
            periodSeconds: 3
            timeoutSeconds: 3
          name: redis
          ports:
            - containerPort: 6379
              protocol: TCP
      restartPolicy: Always
